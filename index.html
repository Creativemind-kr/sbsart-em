<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>코리아교육그룹 채용공고</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ── 리셋 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #ccc; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; font-size: 14px; padding-bottom: 70px; }

/* ── 캡처 영역 ── */
.rc-pub { width: 860px; margin: 0 auto; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,.35); }

/* ── 툴 안내 ── */
.rc-tool { background: #222; color: #fff; font-size: 12px; text-align: center; padding: 8px; line-height: 1.6; }

/* ══════════════════════════════════════
   편집 영역 — input/textarea 자체가 편집 필드
   label은 캡처 시에만 표시
══════════════════════════════════════ */
.rc-edit-area { display: inline-block; position: relative; width: 100%; }
.rc-edit-area label { display: none; white-space: pre-wrap; line-height: 1.6; }

.rc-edit-area input[type="text"],
.rc-edit-area textarea {
  display: block; width: 100%;
  border: 1px dashed transparent;
  background: transparent;
  font-family: inherit; font-size: inherit; font-weight: inherit;
  color: inherit; text-align: inherit; letter-spacing: inherit;
  line-height: 1.6; padding: 1px 3px;
  resize: none; outline: none; overflow: hidden;
}
.rc-edit-area:hover input[type="text"],
.rc-edit-area:hover textarea { border-color: rgba(0,0,0,.3); background: rgba(255,255,255,.45); }
.rc-edit-area input[type="text"]:focus,
.rc-edit-area textarea:focus { border-color: #2196f3 !important; background: rgba(255,255,255,.95) !important; color: #111 !important; }

/* 캡처 모드 */
.rc-cap-ok .rc-edit-area label       { display: block !important; }
.rc-cap-ok .rc-edit-area input[type="text"],
.rc-cap-ok .rc-edit-area textarea    { display: none !important; }
.rc-cap-ok .rc-tool,
.rc-cap-ok .add_button,
.rc-cap-ok .delete_button,
.rc-cap-ok .img-chk-wrap             { display: none !important; }
.chk-false                            { display: none !important; }

/* ── 이미지 래퍼 ── */
.rc-img-wrap { position: relative; line-height: 0; }
.rc-img-wrap img.recruit-img { width: 100%; display: block; }
.img-chk-wrap {
  position: absolute; top: 6px; left: 8px; z-index: 10;
  background: rgba(0,0,0,.55); border-radius: 3px; padding: 3px 8px;
}
.img-chk-wrap label { color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

/* ── 헤더 ── */
.rc-head { background: #fff; text-align: center; padding: 30px 20px 24px; border-bottom: 3px solid #1a2a5e; }
.rc-head h2 { margin: 3px 0; }
.rc-head h2:nth-of-type(1) { font-size: 26px; font-weight: 900; color: #111; }
.rc-head h2:nth-of-type(2) { font-size: 22px; font-weight: 900; color: #24dcf6; }
.rc-head h2:nth-of-type(3) { font-size: 18px; font-weight: 700; color: #00507f; margin-top: 6px; }
.rc-head h2 .rc-edit-area { display: block; }
.rc-head h2 .rc-edit-area input[type="text"] { text-align: center; }

/* ── 섹션 타이틀 ── */
.rc-table-tit {
  display: flex; justify-content: space-between; align-items: center;
  background: #1a2a5e; color: #fff;
  padding: 9px 14px; font-size: 14px; font-weight: 700;
}
.rc-table-tit .left-wrap .rc-edit-area input { color: #fff; font-weight: 700; font-size: 14px; }
.rc-table-tit .right-wrap { font-size: 13px; font-weight: 400; display: flex; align-items: center; gap: 6px; }
.rc-table-tit .right-wrap .rc-edit-area input { color: #fff; font-size: 13px; width: 80px; }

/* ── 테이블 ── */
.rc-table-wrap { padding: 16px 20px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 6px; }
th { background: #1a2a5e; color: #fff; text-align: center; padding: 9px 8px; border: 1px solid #2a3a8e; }
th .rc-edit-area input { color: #fff; text-align: center; font-weight: 700; }
td { padding: 8px 10px; border: 1px solid #ccc; vertical-align: top; }
td:first-child { text-align: center; font-weight: 700; background: #f4f7ff; width: 110px; }
.rc-table-lg { width: 34%; }
td .rc-edit-area textarea { min-height: 40px; }

/* ── 행 추가/삭제 버튼 ── */
.add_button, .delete_button {
  padding: 5px 13px; margin: 4px 4px 10px 0;
  border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-family: inherit;
}
.add_button    { background: #1a2a5e; color: #fff; }
.delete_button { background: #c00; color: #fff; }

/* ── 지원 정보 ── */
.rc-info-wrap { background: #f7f8fc; padding: 20px; border-top: 4px solid #1a2a5e; }
.rc-info dl { display: flex; align-items: flex-start; border-bottom: 1px solid #ddd; padding: 8px 0; gap: 16px; }
.rc-info dl:last-child { border-bottom: none; }
.rc-info dt { min-width: 72px; font-weight: 700; color: #1a2a5e; font-size: 13px; flex-shrink: 0; padding-top: 2px; }
.rc-info dd { flex: 1; font-size: 13px; color: #333; }
.rc-info dt .rc-edit-area input { font-weight: 700; color: #1a2a5e; font-size: 13px; }
.rc-info dd .rc-edit-area input { color: #333; font-size: 13px; }

/* ── 하단 고정 버튼 ── */
#fixed-btns {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center; gap: 12px;
  padding: 11px 16px; background: rgba(0,0,0,.75); z-index: 999;
}
.btn_download {
  background: #f5d87a; color: #1a2a5e; font-weight: 900; font-size: 15px;
  padding: 10px 36px; border: none; border-radius: 5px; cursor: pointer; font-family: inherit;
}
.btn_download:hover { background: #e5c85a; }
.btn_refresh {
  background: #555; color: #fff; font-size: 14px;
  padding: 10px 24px; border: none; border-radius: 5px; cursor: pointer; font-family: inherit;
}
.btn_refresh:hover { background: #333; }
</style>
</head>
<body>

      <thead>
        <tr>
          <th><span class="rc-edit-area"><label>모집분야</label><input type="text" value="모집분야"></span></th>

          <td><span class="rc-edit-area"><label>- 모션그래픽학과 (평일오전)
(Premiere Pro, After Effect)</label><textarea rows="2">- 모션그래픽학과 (평일오전)
(Premiere Pro, After Effect)</textarea></span></td>

- 성실성, 꼼꼼함, 원만한 대인관계</label><textarea rows="3">- 적극적이고 밝은 성격의 소유자
- 강의에 대한 책임감이 강하신 분
- 성실성, 꼼꼼함, 원만한 대인관계</textarea></span></td>
        </tr>
      </tbody>
    </table>
    <button class="add_button" data-type="2" data-cols="3">+ 행 추가</button>
    <button class="delete_button" onclick="deleteRow('2')">마지막 행 삭제</button>

    <!-- 근무조건 -->
    <h3 class="rc-table-tit" style="margin-top:16px;">
      <div class="left-wrap">
        <span class="rc-edit-area"><label>[ 근무조건 ]</label><input type="text" value="[ 근무조건 ]"></span>
      </div>
    </h3>
    <table class="tableType1">
      <colgroup><col style="width:110px"><col></colgroup>
      <thead>
        <tr>
          <th><span class="rc-edit-area"><label>모집분야</label><input type="text" value="모집분야"></span></th>
          <th><span class="rc-edit-area"><label>근무조건</label><input type="text" value="근무조건"></span></th>
        </tr>
      </thead>
      <tbody class="tableBodyType1">
        <tr>
          <td><span class="rc-edit-area"><label>교육부</label><textarea rows="1">교육부</textarea></span></td>
          <td><span class="rc-edit-area"><label>- 근무요일 : 면접 후 협의 (평일 오전)
- 근무시간 : 면접 후 협의
- 급여조건 : 면접 후 협의
- 근무장소 : SBS아카데미컴퓨터아트학원 천안점
※ 천안점 : 충청남도 천안시 서북구 (면접 후 상세 안내)</label><textarea rows="5">- 근무요일 : 면접 후 협의 (평일 오전)
- 근무시간 : 면접 후 협의
- 급여조건 : 면접 후 협의
- 근무장소 : SBS아카데미컴퓨터아트학원 천안점
※ 천안점 : 충청남도 천안시 서북구 (면접 후 상세 안내)</textarea></span></td>
        </tr>
      </tbody>
    </table>
    <button class="add_button" data-type="1" data-cols="2">+ 행 추가</button>
    <button class="delete_button" onclick="deleteRow('1')">마지막 행 삭제</button>
  </div>

  <!-- 직무 프로세스 이미지 -->
  <div class="rc-img-wrap">
    <div class="img-chk-wrap"><label><input type="checkbox" name="imgChk" checked> 직무 프로세스</label></div>
    <img class="recruit-img" src="/application/recruit/img/keg-recruit-mentor-process02.jpg" alt="" onerror="this.style.display='none'">
  </div>

  <!-- 구분선 이미지 -->
  <div class="rc-img-wrap">
    <img class="recruit-img" src="/application/recruit/img/keg-recruit-line.jpg" alt="" onerror="this.style.display='none'">
  </div>

  <!-- 지원 정보 -->
  <div class="rc-info-wrap">
    <div class="rc-info">
      <dl>
        <dt><span class="rc-edit-area"><label>접수기간</label><input type="text" value="접수기간"></span></dt>
        <dd><span class="rc-edit-area"><label>채용시 마감</label><input type="text" value="채용시 마감"></span></dd>
      </dl>
      <dl>
        <dt><span class="rc-edit-area"><label>전형절차</label><input type="text" value="전형절차"></span></dt>
        <dd><span class="rc-edit-area"><label>서류전형 → 1차 직무 면접 → 2차 최종면접 → 최종합격</label><input type="text" value="서류전형 → 1차 직무 면접 → 2차 최종면접 → 최종합격"></span></dd>
      </dl>
      <dl>
        <dt><span class="rc-edit-area"><label>지원서류</label><input type="text" value="지원서류"></span></dt>
        <dd><span class="rc-edit-area"><label>이력서 (사진첨부 필수) / 자기소개서</label><input type="text" value="이력서 (사진첨부 필수) / 자기소개서"></span></dd>
      </dl>
      <dl>
        <dt><span class="rc-edit-area"><label>접수방법</label><input type="text" value="접수방법"></span></dt>
        <dd><span class="rc-edit-area"><label>온라인접수 (해당 채용공고를 통한 접수)</label><input type="text" value="온라인접수 (해당 채용공고를 통한 접수)"></span></dd>
      </dl>
      <dl>
        <dt><span class="rc-edit-area"><label>제출서류</label><input type="text" value="제출서류"></span></dt>
        <dd><span class="rc-edit-area"><label>최종합격시 제출</label><input type="text" value="최종합격시 제출"></span></dd>
      </dl>

        <dd><span class="rc-edit-area"><label>1588-5177</label><input type="text" value="1588-5177"></span></dd>
      </dl>

  <!-- 꿈의 기업 이미지 -->

    <div class="img-chk-wrap"><label><input type="checkbox" name="imgChk" checked> 기업 소개</label></div>
    <img class="recruit-img" src="/application/recruit/img/keg-recruit-aff.jpg" alt="" onerror="this.style.display='none'">
  </div>

  <!-- 전국지점 이미지 -->
  <div class="rc-img-wrap">
    <div class="img-chk-wrap"><label><input type="checkbox" name="imgChk" checked> 전국지점</label></div>
    <img class="recruit-img" src="/application/recruit/img/keg-recruit-location.jpg" alt="" onerror="this.style.display='none'">

<div id="fixed-btns">
  <button type="button" class="btn_download" id="get_down">⬇ 이미지로 저장</button>
  <button class="btn_refresh" onclick="location.reload()">↺ 다시쓰기</button>
</div>

<script>
/* textarea 자동 높이 */
function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
document.querySelectorAll('textarea').forEach(function(ta) {
  ta.addEventListener('input', function() { autoResize(this); });
  autoResize(ta);
});

/* 이미지 저장 */
document.getElementById('get_down').addEventListener('click', function() {
  /* 체크 해제 이미지 숨기기 */
  document.querySelectorAll('input[name="imgChk"]').forEach(function(chk) {
    if (!chk.checked) chk.closest('.rc-img-wrap').classList.add('chk-false');
  });
  /* label에 값 반영 */
  document.querySelectorAll('.rc-edit-area').forEach(function(area) {
    var label = area.querySelector('label');
    var field = area.querySelector('input[type="text"], textarea');
    if (label && field) label.innerHTML = field.value.replace(/\n/g, '<br>');
  });
  /* 캡처 모드 */
  document.getElementById('rcCapture').classList.add('rc-cap-ok');

  html2canvas(document.getElementById('rcCapture'), { scale: 2, useCORS: true, allowTaint: true, logging: false })
    .then(function(canvas) {
      var a = document.createElement('a');
      a.href = canvas.toDataURL('image/jpeg', 0.92);
      a.download = '채용공고.jpg';
      a.click();
      /* 복원 */
      document.getElementById('rcCapture').classList.remove('rc-cap-ok');
      document.querySelectorAll('.chk-false').forEach(function(el) { el.classList.remove('chk-false'); });
    });
});

/* 행 추가 */
document.querySelectorAll('.add_button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var type = btn.dataset.type;
    var cols = parseInt(btn.dataset.cols);
    var tbody = document.querySelector('.tableBodyType' + type);
    if (!tbody) return;
    var defaults = [['교육부','교육부'],['- 내용 입력','- 내용 입력'],['- 자격 요건 입력','- 자격 요건 입력']];
    var row = tbody.insertRow();
    for (var i = 0; i < cols; i++) {
      var cell = row.insertCell(i);
      if (i === 0) cell.style.cssText = 'text-align:center;font-weight:700;background:#f4f7ff;width:110px;';
      var ph = defaults[i] || ['내용','내용'];
      var lbl = document.createElement('label');
      lbl.style.display = 'none';
      lbl.textContent = ph[0];
      var ta = document.createElement('textarea');
      ta.rows = 2; ta.value = ph[1];
      ta.style.cssText = 'display:block;width:100%;border:1px dashed transparent;background:transparent;font-family:inherit;font-size:13px;resize:none;outline:none;line-height:1.6;padding:1px 3px;';
      ta.addEventListener('input', function() { autoResize(this); });
      var span = document.createElement('span');
      span.className = 'rc-edit-area';
      span.style.display = 'block';
      span.appendChild(lbl); span.appendChild(ta);
      cell.appendChild(span);
      autoResize(ta);
    }
  });
});

/* 행 삭제 */
function deleteRow(type) {
  var tbody = document.querySelector('.tableBodyType' + type);
  if (tbody && tbody.rows.length > 0) tbody.deleteRow(tbody.rows.length - 1);
}
</script>
</body>
</html>
