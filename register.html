<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 — 코리아교육그룹</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #00152c;
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      padding: 40px 16px;
    }
    .card {
      background: #fff; border-radius: 16px;
      padding: 48px 44px 40px; width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }
    .logo { font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; text-align: center; }
    h1 { font-size: 20px; font-weight: bold; color: #00152c; margin-bottom: 32px; text-align: center; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 12px; color: #555; font-weight: bold; margin-bottom: 6px; letter-spacing: 0.5px; }
    label .req { color: #e53935; margin-left: 2px; }
    input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 15px; font-family: inherit;
      outline: none; transition: border-color .2s; background: #fff;
    }
    input:focus { border-color: #00507f; }
    .hint { font-size: 11px; color: #aaa; margin-top: 5px; }
    .field-err { font-size: 12px; color: #e53935; margin-top: 5px; display: none; }
    .secret-box {
      background: #f0f6fb; border-radius: 8px;
      padding: 16px; margin-bottom: 18px;
    }
    .secret-box .q-label { font-size: 13px; color: #00507f; font-weight: bold; margin-bottom: 10px; }
    .btn-primary {
      width: 100%; padding: 14px;
      background: #00507f; color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: bold; cursor: pointer;
      transition: background .2s; letter-spacing: 1px; margin-top: 8px;
    }
    .btn-primary:hover { background: #003d60; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .global-err {
      background: #fdecea; border-radius: 8px;
      padding: 12px 14px; font-size: 13px; color: #e53935;
      margin-top: 14px; display: none;
    }
    .success-msg {
      background: #e8f5e9; border-radius: 8px;
      padding: 12px 14px; font-size: 13px; color: #2e7d32;
      margin-top: 14px; display: none; text-align: center; font-weight: bold;
    }
    .divider { margin: 24px 0 16px; border: none; border-top: 1px solid #eee; }
    .login-link { font-size: 13px; color: #888; text-align: center; }
    .login-link a { color: #00507f; font-weight: bold; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }
    .device-warn {
      background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px;
      padding: 12px 14px; font-size: 12px; color: #795548;
      margin-bottom: 20px; line-height: 1.6;
    }
    .device-warn strong { color: #e65100; }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">Korea Education Group</p>
    <h1>회원가입</h1>

    <div class="device-warn">
      ⚠️ <strong>이 기기에서만 사용 가능한 계정입니다.</strong><br>
      계정 정보는 현재 브라우저에만 저장되며,<br>
      다른 기기나 브라우저에서는 사용할 수 없습니다.
    </div>

    <div class="field">
      <label for="name">이름 <span class="req">*</span> <span style="font-weight:normal;color:#aaa;">(아이디로 사용)</span></label>
      <input type="text" id="name" placeholder="홍길동" />
      <p class="field-err" id="err-name"></p>
    </div>

    <div class="field">
      <label for="branch">지점 <span class="req">*</span></label>
      <input type="text" id="branch" placeholder="예) 강남, 수원, 홍대" />
      <p class="field-err" id="err-branch"></p>
    </div>

    <div class="secret-box">
      <p class="q-label">🔐 본인 확인 질문</p>
      <div class="field" style="margin-bottom:0;">
        <label>계열 특성은 무엇인가? <span class="req">*</span></label>
        <input type="text" id="secret" placeholder="답변을 입력하세요" />
        <p class="field-err" id="err-secret"></p>
      </div>
    </div>

    <div class="field">
      <label for="pwd">비밀번호 <span class="req">*</span></label>
      <input type="password" id="pwd" placeholder="비밀번호 입력" />
      <p class="hint">숫자, 문자 제한 없이 자유롭게 설정 가능합니다</p>
      <p class="field-err" id="err-pwd"></p>
    </div>

    <div class="field">
      <label for="pwd2">비밀번호 확인 <span class="req">*</span></label>
      <input type="password" id="pwd2" placeholder="비밀번호 재입력"
             onkeydown="if(event.key==='Enter') register()" />
      <p class="field-err" id="err-pwd2"></p>
    </div>

    <button class="btn-primary" id="btn" onclick="register()">가입하기</button>
    <p class="global-err" id="global-err"></p>
    <p class="success-msg" id="success-msg">✅ 가입 완료! 로그인 페이지로 이동합니다...</p>

    <hr class="divider" />
    <p class="login-link">이미 계정이 있으신가요? <a href="/login.html">로그인</a></p>
  </div>

  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function getUsers() {
      return JSON.parse(localStorage.getItem('recruit_users') || '[]');
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    async function register() {
      const name   = document.getElementById('name').value.trim();
      const branch = document.getElementById('branch').value.trim();
      const secret = document.getElementById('secret').value.trim();
      const pwd    = document.getElementById('pwd').value;
      const pwd2   = document.getElementById('pwd2').value;
      const btn    = document.getElementById('btn');
      const gErr   = document.getElementById('global-err');

      ['err-name','err-branch','err-secret','err-pwd','err-pwd2'].forEach(id => showErr(id, ''));
      gErr.style.display = 'none';

      let valid = true;
      if (!name)   { showErr('err-name', '이름을 입력해주세요.'); valid = false; }
      if (!branch) { showErr('err-branch', '지점을 입력해주세요.'); valid = false; }
      if (!secret) {
        showErr('err-secret', '답변을 입력해주세요.'); valid = false;
      } else if (secret !== '컴퓨터') {
        showErr('err-secret', '답변이 올바르지 않습니다. 가입이 불가합니다.'); valid = false;
      }
      if (!pwd)  { showErr('err-pwd', '비밀번호를 입력해주세요.'); valid = false; }
      if (!pwd2) { showErr('err-pwd2', '비밀번호 확인을 입력해주세요.'); valid = false; }
      else if (pwd !== pwd2) { showErr('err-pwd2', '비밀번호가 일치하지 않습니다.'); valid = false; }
      if (!valid) return;

      btn.disabled = true; btn.textContent = '처리 중...';

      const users = getUsers();
      if (users.find(u => u.name === name)) {
        gErr.textContent = '이미 사용 중인 이름입니다. 다른 이름을 사용해주세요.';
        gErr.style.display = 'block';
        btn.disabled = false; btn.textContent = '가입하기';
        return;
      }

      const hash = await sha256(pwd);
      const newUser = { id: Date.now(), name, branch, password_hash: hash };
      users.push(newUser);
      localStorage.setItem('recruit_users', JSON.stringify(users));

      document.getElementById('success-msg').style.display = 'block';
      setTimeout(() => window.location.replace('/login.html'), 2000);
    }
  </script>
</body>
</html>
